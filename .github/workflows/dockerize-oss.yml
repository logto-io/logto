name: Dockerize OSS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional docker image tag override (defaults to oss-<short-sha>)
        required: false
        default: ""
        type: string
      dev_features_enabled:
        description: DEV_FEATURES_ENABLED passed to Docker build arg
        required: false
        default: "false"
        type: string
      logto_oss_survey_endpoint:
        description: LOGTO_OSS_SURVEY_ENDPOINT passed to Docker build arg
        required: false
        default: https://logto-oss-survey-dev.svhd.workers.dev
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.image_tag || github.run_id }}
  cancel-in-progress: true

jobs:
  oss-dockerize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: image_tag
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          IMAGE_TAG="$IMAGE_TAG_INPUT"

          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="oss-${GITHUB_SHA::7}"
          fi

          if [[ ! "$IMAGE_TAG" =~ ^[a-zA-Z0-9_][a-zA-Z0-9_.-]{0,127}$ ]]; then
            echo "Invalid image_tag: $IMAGE_TAG"
            exit 1
          fi

          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OSS docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/logto-oss:${{ steps.image_tag.outputs.value }}
          build-args: |
            dev_features_enabled=${{ inputs.dev_features_enabled }}
            logto_oss_survey_endpoint=${{ inputs.logto_oss_survey_endpoint }}

      - name: Export docker image tarball
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/logto-oss:${{ steps.image_tag.outputs.value }}
          docker pull "$IMAGE"
          docker save "$IMAGE" | gzip > /tmp/logto-oss-${{ steps.image_tag.outputs.value }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: logto-oss-image-${{ steps.image_tag.outputs.value }}
          path: /tmp/logto-oss-${{ steps.image_tag.outputs.value }}.tar.gz
          retention-days: 14
