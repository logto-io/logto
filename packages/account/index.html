<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <title>Account Center</title>
  <script>
    /* See {@link packages/schemas/src/types/ssr.ts} */
    window.logtoSsr = "__LOGTO_ACCOUNT_CENTER_SSR__";
  </script>
</head>

<body>
  <script>
    (function () {
      try {
        var ssr = window.logtoSsr;
        var darkOk = typeof ssr === 'object' && ssr !== null
          && ssr.signInExperience && ssr.signInExperience.data
          && ssr.signInExperience.data.color.isDarkModeEnabled;
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (darkOk && prefersDark) ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.body.classList.add(
          /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop');
        if (typeof ssr === 'object' && ssr !== null && ssr.signInExperience
          && ssr.signInExperience.data && ssr.signInExperience.data.color) {
          var color = ssr.signInExperience.data.color;
          var primaryColor = theme === 'dark' && color.darkPrimaryColor
            ? color.darkPrimaryColor
            : color.primaryColor;
          if (primaryColor) {
            document.body.style.setProperty('--color-brand-default', primaryColor);
          }
        }
      } catch (e) { /* noop */ }
    })();
  </script>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="app"></div>
  <script type="module">
    // Dev-only react-refresh preamble. We load the Vite-provided runtime dynamically so
    // production builds do not try to resolve /@react-refresh (which breaks rollup) while
    // still enabling HMR in development to avoid the “preamble not detected” error.
    if (import.meta.env.DEV) {
      const base = (import.meta.env.BASE_URL ?? '/').replace(/\/?$/, '/');
      const RefreshRuntimeModule = await import(`${base}@react-refresh`);
      const RefreshRuntime = RefreshRuntimeModule.default ?? RefreshRuntimeModule;
      RefreshRuntime.injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    }
  </script>
  <script type="module" src="src/index.tsx"></script>
</body>

</html>
